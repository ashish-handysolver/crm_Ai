<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>handycrm.ai | Next-Gen AI CRM</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="handycrm.ai" />
    <link rel="apple-touch-icon" href="/logo.png" />
  </head>
  <body>
    <div id="root">
        <!-- Minimal Futuristic Fallback / Loading -->
        <div style="height: 100vh; background: #020617; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; color: #475569;">
            <div style="width: 40px; height: 40px; border: 2px solid #6366f1; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
            <div style="font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.3em;">Synchronizing Node...</div>
            <style>
                @keyframes spin { to { transform: rotate(360deg); } }
            </style>
        </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
        // Emergency Fallback: If the main module fails to execute after 5 seconds
        setTimeout(() => {
            if (!window.REACT_ROOT_INITIALIZED) {
                console.warn('HANDYCRM_SIGNAL_FAIL: System initialization timed out. Diverting to outage terminal.');
                // Only redirect if we haven't already hit a specific error listener
                // window.location.href = '/outage.html'; 
            }
        }, 8000);
    </script>
  </body>
</html>
