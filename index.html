<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>handycrm.ai | Next-Gen AI CRM</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="handycrm.ai" />
    <link rel="apple-touch-icon" href="/logo.png" />
  </head>
  <body>
    <div id="root">
        <!-- App Shell Skeleton Loading -->
        <style>
            @keyframes skel-pulse {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.5; }
            }
            .skel-pulse { animation: skel-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
            .skel-bg { background-color: #e2e8f0; }
            .skel-bg-dark { background-color: #1e293b; }
            .skel-app { display: flex; height: 100vh; width: 100vw; background-color: #f8fafc; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
            .skel-sidebar { width: 280px; background-color: #020617; display: none; padding: 2rem 1.5rem; flex-direction: column; gap: 1rem; border-right: 1px solid rgba(255,255,255,0.05); }
            .skel-main { flex: 1; padding: 1.5rem; display: flex; flex-direction: column; gap: 2rem; }
            .skel-header { display: flex; justify-content: space-between; align-items: flex-end; }
            .skel-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
            @media (min-width: 1024px) {
                .skel-sidebar { display: flex; }
                .skel-main { padding: 3rem; }
                .skel-grid { grid-template-columns: repeat(3, 1fr); }
            }
        </style>
        <div class="skel-app">
            <div class="skel-sidebar">
                <div class="skel-pulse skel-bg-dark" style="height: 40px; border-radius: 12px; margin-bottom: 2rem;"></div>
                <div class="skel-pulse skel-bg-dark" style="height: 24px; border-radius: 8px; width: 80%;"></div>
                <div class="skel-pulse skel-bg-dark" style="height: 24px; border-radius: 8px; width: 60%;"></div>
                <div class="skel-pulse skel-bg-dark" style="height: 24px; border-radius: 8px; width: 70%;"></div>
            </div>
            <div class="skel-main">
                <div class="skel-header">
                    <div style="width: 40%; max-width: 300px;">
                        <div class="skel-pulse skel-bg" style="height: 16px; width: 100px; border-radius: 99px; margin-bottom: 12px;"></div>
                        <div class="skel-pulse skel-bg" style="height: 48px; width: 100%; border-radius: 16px;"></div>
                    </div>
                    <div class="skel-pulse skel-bg" style="height: 40px; width: 120px; border-radius: 12px; display: none;"></div>
                </div>
                <div class="skel-grid">
                    <div class="skel-pulse skel-bg" style="height: 160px; border-radius: 2rem;"></div>
                    <div class="skel-pulse skel-bg" style="height: 160px; border-radius: 2rem;"></div>
                    <div class="skel-pulse skel-bg" style="height: 160px; border-radius: 2rem;"></div>
                </div>
                <div class="skel-pulse skel-bg" style="flex: 1; width: 100%; border-radius: 2.5rem; margin-top: 1rem;"></div>
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
        // Emergency Fallback: If the main module fails to execute after 5 seconds
        setTimeout(() => {
            if (!window.REACT_ROOT_INITIALIZED) {
                console.warn('HANDYCRM_SIGNAL_FAIL: System initialization timed out. Diverting to outage terminal.');
                // Only redirect if we haven't already hit a specific error listener
                // window.location.href = '/outage.html'; 
            }
        }, 8000);
    </script>
  </body>
</html>
